<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <text x="10" y="58" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" letter-spacing="2" fill="#F5F5F5">LUXO</text>
    <text x="200" y="58" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="300" font-size="48" fill="#C9A86A">·</text>
  </g>
</svg>